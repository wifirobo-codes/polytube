<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PolyTube</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>PolyTube</h1>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="upload.html">Upload</a>
      <a href="login.html" id="auth-link">Sign In</a>
    </div>
  </header>

  <div class="card" id="auth-box" style="display:none;">
    <h3>Creator Settings</h3>
    <p id="user-display-name"></p><br>
    <input type="text" id="custom-name-input" placeholder="Set custom creator name">
    <button id="save-name-btn">Save</button>
    <button id="logout-btn" style="background:#ff9999;">Sign Out</button>
  </div>

  <div class="card">
    <input type="text" id="search-input" placeholder="Search videos, #tags, people...">
    <button id="search-btn">Search</button>
  </div>

  <div class="card">
    <h3>Feed</h3>
    <div class="video-grid" id="video-feed"></div>
  </div>

  <script src="index.js"></script>
</body>
</html>
